<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio & Video Background</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            background: #000;
            font-family: Arial, sans-serif;
            color: #fff;
        }

        .wrapper {
            position: relative;
            min-height: 100vh;
            overflow: hidden;
        }

        .video-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .video-bg video {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 56.25vw;
            min-height: 100vh;
            min-width: 177.78vh;
            transform: translate(-50%, -50%);
            object-fit: cover;
            border: 0;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.65));
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 15px;
        }

        .panel {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-width: 700px;
            text-align: center;
            margin-bottom: 20px;
        }

        audio, video {
            width: 100%;
            max-width: 560px;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="video-bg">
            <video autoplay muted loop playsinline>
                <source src="https://samplelib.com/preview/mp4/sample-5s.mp4" type="video/mp4">
            </video>
        </div>
        <div class="overlay"></div>

        <div class="content">
            <div class="panel">
                <h1 class="mb-3">Audio</h1>
                <audio controls>
                    <source src="https://samplelib.com/mp3/sample-3s.mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>

            <div class="panel">
                <h1 class="mb-3">Video</h1>
                <video width="320" height="240" controls class="mx-auto">
                    <source src="https://samplelib.com/preview/mp4/sample-5s.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>
    </div>
</body>
</html>
