<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>audiovideo</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            position: relative;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("file:///C:/Users/acer/Downloads/julia-kadel-j1qmrXLSsuY-unsplash.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 0;
        }

        .youtube-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .youtube-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .media-section {
            text-align: center;
            margin: 30px auto;
            max-width: 700px;
            width: 100%;
        }

        .media-section h1 {
            margin-bottom: 10px;
        }

        audio, video {
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="youtube-bg">
        <video autoplay muted loop playsinline>
            <source src="https://samplelib.com/preview/mp4/sample-5s.mp4" type="video/mp4">
        </video>
    </div>

    <div class="content">
        <div class="media-section">
            <h1>Audio</h1>
            <audio controls>
                <source src="https://samplelib.com/mp3/sample-3s.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>

        <div class="media-section">
            <h1>Video</h1>
            <video width="320" height="240" controls>
                <source src="https://samplelib.com/preview/mp4/sample-5s.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>
</body>
</html>
